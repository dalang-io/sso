name: Release

# Build cross-platform binaries and attach them to a GitHub Release whenever a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sso-linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: sso-linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - name: sso-macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: sso-macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-zigbuild (musl targets)
        if: contains(matrix.target, 'linux')
        run: |
          pip install ziglang
          cargo install cargo-zigbuild
      - name: Build (linux, static musl)
        if: contains(matrix.target, 'linux')
        run: cargo zigbuild --release --target ${{ matrix.target }} -p sso-server
      - name: Build (macOS)
        if: contains(matrix.target, 'darwin')
        run: cargo build --release --target ${{ matrix.target }} -p sso-server
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/sso ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256 || sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
          generate_release_notes: true
