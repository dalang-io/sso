<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ brand_title }}{% endblock %}</title>
  <!-- Everything is served locally (no CDN / external fonts) so the UI works in
       airgapped deployments. Favicon + logo are configurable via env. -->
  <link rel="icon" href="/assets/favicon" type="{{ favicon_mime }}" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/dashboard" class="brand">
        <img src="/assets/logo" alt="{{ brand_title }} logo" />
        {{ brand_title }}
      </a>
      {% if admin_email %}
      <div class="header-meta">
        {% if admin_role == "super" %}<span class="badge badge-super">super admin</span>{% endif %}
        <span class="muted small">{{ admin_email }}</span>
        <form method="post" action="/logout"><button class="btn btn-sm btn-secondary">Sign out</button></form>
      </div>
      {% endif %}
    </div>
  </header>
  <main class="container main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
