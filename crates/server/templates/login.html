{% extends "base.html" %}
{% block title %}Sign in — Dalang SSO{% endblock %}
{% block content %}
<div class="mx-auto max-w-sm">
  <h1 class="mb-6 text-xl font-semibold text-slate-900">Sign in to the dashboard</h1>
  {% if error %}
  <div class="mb-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login" class="space-y-4 rounded-lg border border-slate-200 bg-white p-6">
    <div>
      <label class="block text-sm font-medium text-slate-700">Email</label>
      <input name="email" type="email" required autofocus
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      <input name="password" type="password" required
             class="mt-1 w-full rounded border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none" />
    </div>
    <button class="w-full rounded bg-indigo-600 px-4 py-2 font-medium text-white hover:bg-indigo-700">Sign in</button>
  </form>
</div>
{% endblock %}
