{% extends "base.html" %}
{% block title %}Sign in · {{ brand_title }}{% endblock %}
{% block content %}
<div class="container-sm">
  <h1>Sign in to the dashboard</h1>
  {% if error %}<div class="alert alert-danger mb">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="panel stack">
    <div class="field">
      <label class="label">Email</label>
      <input class="input" name="email" type="email" required autofocus />
    </div>
    <div class="field">
      <label class="label">Password</label>
      <input class="input" name="password" type="password" required />
    </div>
    <button class="btn btn-primary btn-block">Sign in</button>
  </form>
</div>
{% endblock %}
